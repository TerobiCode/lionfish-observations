version: 2

models:
  - name: stg_lionfish__bulk
    description: "Cleaned and standardised lionfish observations from the iNaturalist bulk CSV export. Contains historical observations up to the date of the bulk export."
    columns:
      - name: observation_id
        description: "Unique sequential identifier for the observation"
        tests:
          - not_null
          - unique
      - name: uuid
        description: "Universally unique identifier for the observation"
        tests:
          - not_null
          - unique
      - name: observed_on
        description: "Date the observation was made"
        tests:
          - not_null
      - name: country
        description: "Country where the observation was made, derived from reverse geocoding by iNaturalist"
      - name: latitude
        description: "Latitude coordinate of the observation, validated between -90 and 90"
      - name: longitude
        description: "Longitude coordinate of the observation, validated between -180 and 180"
      - name: latin_name
        description: "Scientific name of the observed taxon"
        tests:
          - not_null
      - name: common_name
        description: "Common name of the observed taxon"
      - name: ingestion_source
        description: "Source of the observation data"
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: ['bulk']

  - name: stg_lionfish__incremental
    description: "Cleaned and standardised lionfish observations from the daily ADF incremental pipeline. Contains observations submitted to iNaturalist after the bulk export date."
    columns:
      - name: observation_id
        description: "Unique sequential identifier for the observation"
        tests:
          - not_null
          - unique
      - name: uuid
        description: "Universally unique identifier for the observation"
        tests:
          - not_null
          - unique
      - name: observed_on
        description: "Date the observation was made"
        tests:
          - not_null
      - name: country
        description: "Not available from iNaturalist v2 API. Future improvement: reverse geocoding from coordinates."
      - name: latitude
        description: "Latitude coordinate of the observation, validated between -90 and 90"
        tests:
          - not_null
      - name: longitude
        description: "Longitude coordinate of the observation, validated between -180 and 180"
        tests:
          - not_null
      - name: latin_name
        description: "Scientific name of the observed taxon"
        tests:
          - not_null
      - name: common_name
        description: "Common name of the observed taxon"
      - name: ingestion_source
        description: "Source of the observation data"
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: ['incremental']