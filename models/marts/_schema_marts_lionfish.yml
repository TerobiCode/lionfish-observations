version: 2

models:
  - name: mart_lionfish__observations
    description: "Core fact table of all lionfish observations globally. One row per observation. Used for map visualisations and time series analysis."
    columns:
      - name: observation_id
        description: "Unique sequential identifier for the observation"
        tests:
          - not_null
      - name: uuid
        description: "Universally unique identifier for the observation"
        tests:
          - not_null
          - unique
      - name: observed_on
        description: "Date the observation was made"
        tests:
          - not_null
      - name: observed_month
        description: "Month the observation was made, truncated to first day of month"
      - name: observed_year
        description: "Year the observation was made, truncated to first day of year"
      - name: country
        description: "Country where the observation was made. Available for bulk observations only."
      - name: latitude
        description: "Latitude coordinate of the observation"
        tests:
          - not_null
      - name: longitude
        description: "Longitude coordinate of the observation"
        tests:
          - not_null
      - name: taxon_id
        description: "Unique identifier for the observed taxon"
        tests:
          - not_null
      - name: taxon_name
        description: "Scientific name of the observed taxon"
        tests:
          - not_null
      - name: taxon_common_name
        description: "Common name of the observed taxon"
      - name: ingestion_source
        description: "Source of the observation — bulk or incremental"
        tests:
          - not_null

  - name: mart_lionfish__by_species
    description: "Daily observation counts aggregated by species. Used for species trend charts and comparing invasion patterns across species."
    columns:
      - name: observed_on
        description: "Date of observations"
        tests:
          - not_null
      - name: observed_month
        description: "Month truncated to first day of month"
      - name: observed_year
        description: "Year truncated to first day of year"
      - name: taxon_id
        description: "Unique identifier for the observed taxon"
        tests:
          - not_null
      - name: taxon_name
        description: "Scientific name of the observed taxon"
        tests:
          - not_null
      - name: taxon_common_name
        description: "Common name of the observed taxon"
      - name: observation_count
        description: "Number of observations for this species on this date"
        tests:
          - not_null
      - name: countries_observed_in
        description: "Number of distinct countries where this species was observed on this date"

  - name: mart_lionfish__by_country
    description: "Monthly observation counts aggregated by country. Used for geographic spread analysis and country-level trend charts. Only includes observations with a known country."
    columns:
      - name: country
        description: "Country where observations were made"
        tests:
          - not_null
      - name: observed_month
        description: "Month truncated to first day of month"
        tests:
          - not_null
      - name: observed_year
        description: "Year truncated to first day of year"
        tests:
          - not_null
      - name: observation_count
        description: "Number of observations in this country in this month"
        tests:
          - not_null
      - name: species_count
        description: "Number of distinct species observed in this country in this month"
        tests:
          - not_null
      - name: first_observation_date
        description: "Earliest observation date in this country in this month"
      - name: latest_observation_date
        description: "Most recent observation date in this country in this month"